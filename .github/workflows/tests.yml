---
name: tests

# Run the test suites on pushes to master and on PRs:
#   - bats:   the hand-written shell suite (tests/shell/test_*.bats) — gates
#   - perl:   prove over tests/perl/ — gates (assertions are version-robust)
#   - python: pytest over tests/python/ (activates once tests exist)
#   - pre-commit: the check config (lint/format/secret hooks) via
#                 `pre-commit run --all-files`
# The generated meta suite is not run here yet (it surfaces pre-existing
# legacy lint/format + dependency debt — see TODO.md "Lint/format Debt in
# Legacy Scripts").

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # bats + helper libs come from Debian/Ubuntu packages. bats_load_library
      # resolves bats-support/assert/file from /usr/lib/bats by default; the
      # tests add this checkout's lib/bats to BATS_LIB_PATH for bats-toolbox.
      - name: Install bats and helper libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y bats bats-support bats-assert bats-file

      - name: Run hand-written suite
        run: bats tests/shell/test_*.bats

  # Gating: the perltidyrc-clean + parse_params assertions are version-robust
  # (they assert that a problem was reported, not a specific Perl::Tidy wording
  # or exit code, and key on POD body rather than pod2usage header formatting),
  # so this passes across Perl::Tidy / Pod::Text versions.
  perl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # perl is preinstalled on the runner. Non-core deps: Test::Cmd (used by
      # the tests) and Perl::Tidy (loaded by the script under test); both come
      # from Debian packages.
      - name: Install perl test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtest-cmd-perl perltidy

      # Tests resolve `use lib 'tests/perl/lib'` and the data dir relative to
      # the repo root, so prove must run from the checkout root.
      - name: Run perl suite
        run: prove tests/perl/

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      # tests/python/ has no tests yet; run pytest only once some exist so
      # this job is green-ready and self-activates with the first test.
      - name: Run python suite
        run: |
          if ls tests/python/test_*.py > /dev/null 2>&1; then
            pytest tests/python
          else
            echo "no python tests yet — skipping"
          fi

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      # no-commit-to-branch is a local-only guard; skip it in CI (the run on
      # master would otherwise fail merely for being on master). The gitleaks
      # hook is a no-op here (it scans staged content); full secret scanning
      # is the security-scan skill's job.
      - name: Run pre-commit (check config)
        run: SKIP=no-commit-to-branch pre-commit run --all-files --show-diff-on-failure
