---
name: secret-scan

# Verified secret scanning at PR time (trufflehog).
#
# Complements the commit-time gitleaks pre-commit guard with a verified deep
# scan of the PR diff: trufflehog authenticates each candidate against its
# provider, so it reports *live* secrets with near-zero false positives.
#
# PR-time, not every push: under protected-master nothing reaches the default
# branch except via a PR, so this gates exactly where it counts without
# scanning throwaway branch pushes. (Every-push suits continuous,
# high-assurance/regulated repos; it's overkill here.)
#
# Per config/claude/skills/security-scan (step 4) the scan runs the
# digest-pinned OSS image DIRECTLY, never a marketplace action. Non-required
# for now; promote to a required status check once it has a clean track record
# (a ruleset change — see config/claude/rules/trufflehog.md and WORKFLOW.md).

on:
  pull_request:

permissions:
  contents: read

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    env:
      # Digest-pinned per the security-scan skill; Dependabot's github-actions
      # ecosystem bumps the tag. The digest line can't wrap.
      # yamllint disable-line rule:line-length
      IMAGE: ghcr.io/trufflesecurity/trufflehog:3.95.6@sha256:96f8429082cb2d4ae73b1096dcdb2f5aa139881d97042b0c5e5fa226a392e056
      # Pass the PR base via env, never interpolated into the shell directly.
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout (full history so the PR diff is resolvable)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan the PR diff for verified secrets
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo:ro" "$IMAGE" \
            git file:///repo \
            --since-commit "$BASE_SHA" \
            --results=verified,unknown \
            --fail --no-update
