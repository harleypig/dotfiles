---
# Dependabot version updates.
#
# Security (alert-driven) updates are enabled separately in the repo's
# security settings; this file configures scheduled *version*-update PRs.
# No auto-merge — Dependabot PRs land through the normal protected-master
# flow (squash-only + required checks), reviewed/merged via the ship-pr
# skill like any other PR. Conventions per config/claude/rules/dependabot.md:
# cover every shipped manifest (incl. docker + github-actions), schedule
# weekly, group minor/patch (majors stay individual), conventional commits.
version: 2

updates:
  # Python tooling environment (Poetry manifest). cryptography is pinned
  # directly in the manifest for alert #6; committing a poetry.lock so
  # transitive deps are covered too is a tracked follow-up (see TODO.md).
  # Dependabot's pip ecosystem updates the direct deps listed in
  # pyproject.toml even without a committed lockfile.
  - package-ecosystem: pip
    directory: /config/pypoetry
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions in .github/workflows — keeps actions off deprecated
  # runtimes automatically (cf. the manual Node 20 bump in PR #101).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Docker base-image (FROM) pins in the repo's own Dockerfiles. The
  # vendored Dockerfiles under config/coc/.../node_modules and the plugin
  # marketplace are third-party and are not covered here.
  - package-ecosystem: docker
    directory: /tests/docker
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: docker
    directory: /config/nvm
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
