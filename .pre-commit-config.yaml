---
# Check-only pre-commit hooks (NON-MODIFYING) — run on `git commit` and gate
# the commit. Auto-fixers live in .pre-commit-config-fix.yaml and are run
# manually (see README + .claude/rules/pre-commit.md).
#
# Phase 1 (Core). Security / language / docs hooks are tracked in TODO.md and
# must land here before CI is allowed to gate them.
#
# trailing-whitespace / end-of-file-fixer are intentionally NOT here: those
# hooks can only fix (they modify files), which would violate "check-only".
# They live in the fix config instead.
#
# Revs are pinned. Refresh with `pre-commit autoupdate` when drift is
# suspected (see .claude/rules/pre-commit.md).

# archive/ = retired code; .vscode/syncsettings/ = machine-synced VS Code
# profile data.
exclude: '^(archive/|\.vscode/syncsettings/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Block direct commits to master locally — the server ruleset rejects
      # the push, this catches it earlier, at commit time (see git.md).
      - id: no-commit-to-branch
        args: [--branch, master]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      # VS Code's .vscode/*.json are JSONC (comments, trailing commas), which
      # check-json cannot parse; exclude them.
      - id: check-json
        exclude: '^\.vscode/'
      # Secret detection (Phase 2): catch committed private keys.
      - id: detect-private-key

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: [--external-sources]
      # Extensionless SOURCED shell files (shell-startup, config/shell-startup/*,
      # lib/*) are NOT tagged `shell` by identify — it only reads a shebang for
      # *executable* files, and these are non-executable. Select them by path.
      - id: shellcheck
        alias: shellcheck-sourced
        name: shellcheck (sourced shell)
        args: [--external-sources]
        types: [text]
        files: &sourced_shell '^(shell-startup|config/shell-startup/[^./]+|lib/[^./]+)$'

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      # -d = diff only (non-modifying); flags match shfmt.md / .editorconfig.
      # shfmt does not parse .bats (@test); exclude them (see bats.md).
      - id: shfmt
        args: [-d, -i, '2', -s, -bn, -ci, -sr]
        exclude: '\.bats$'
      # Same extensionless-sourced-shell coverage as shellcheck above.
      - id: shfmt
        alias: shfmt-sourced
        name: shfmt (sourced shell)
        args: [-d, -i, '2', -s, -bn, -ci, -sr]
        types: [text]
        files: *sourced_shell

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, config/yamllint/config]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    # SYNC: keep this rev in lock-step with image[markdownlint] in
    # bin/docker_wrapper (the bin/markdownlint docker wrapper) and the rev in
    # .pre-commit-config-fix.yaml; bump all three together.
    rev: v0.48.0
    hooks:
      # Uses the repo-local .markdownlint.json (auto-discovered at the root).
      - id: markdownlint

  # Phase 3 (Language) — Python: import order, format, lint. Tools match the
  # repo's yapf + isort + flake8 choice (python.md), not black/ruff.
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: [--check, --diff]

  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      # 2-space style from config/yapf/style; -d = diff only (non-modifying).
      - id: yapf
        args: [-d, --style, config/yapf/style]

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      # config/flake8 reconciles flake8 with yapf's 2-space style (flake8.md).
      - id: flake8
        args: [--config, config/flake8]

  # Phase 3 (Language) — Perl: DEFERRED (intentionally not enabled). Enabling
  # either tool in this *gating* config would currently break the gate:
  #   - perlcritic --severity 4 reports substantial debt on existing code, and
  #     config/perl/perlcriticrc references policy bundles (OTRS, TryTiny) that
  #     are not installed;
  #   - perltidy has the version-drift problem that already makes the perl CI
  #     job non-gating (see TODO.md "perl CI" + perlbrew pinning).
  # Re-enable once the debt is cleared, the perlcriticrc is trimmed to
  # installed policies, perltidy is pinned via perlbrew, and the perl tools are
  # installed in the CI pre-commit job:
  # - repo: local
  #   hooks:
  #     - id: perlcritic
  #       name: perlcritic --severity 4
  #       entry: perlcritic --severity 4 --profile config/perl/perlcriticrc
  #       language: system
  #       types: [perl]
  #
  # Phase 3 (Language) — Rust: N/A (no Rust in this repo).

  # Secret detection (Phase 2). The gitleaks hook scans staged content at
  # commit time — an effective local guard, but a no-op in CI's --all-files
  # run (nothing is staged there). Full-repo/history secret scanning is the
  # security-scan skill's job, not this hook.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
