AZURE_DEVOPS_EXT_PAT=azure
# ANTHROPIC_API_KEY is intentionally NOT exported globally: per Claude
# Code's auth precedence it overrides the Max subscription AND the
# long-lived CLAUDE_CODE_OAUTH_TOKEN below, which forced a re-login every
# ~12h. Tools that need it read private_dotfiles/api-key/anthropic
# directly (the mymcp pattern). CLAUDE_CODE_OAUTH_TOKEN is the long-lived
# `claude setup-token` for the Max subscription. Full scheme + precedence:
# config/claude/rules/claude-code-auth.md.
CLAUDE_CODE_OAUTH_TOKEN=claude-code
LINODE_TOKEN=linode
OPENAI_API_KEY=openai
OPENROUTER_API_KEY=openrouter
XAI_API_KEY=grok
# GH_TOKEN is the single wide-open PAT for the gh CLI. GITHUB_TOKEN is
# deliberately left unset; gh falls through to GH_TOKEN, and MCP servers
# read their own scoped tokens directly (see bin/mymcp).
GH_TOKEN=gh

# These need to be set manually on a workstation
LDAP_PASS=pass.ldap
VAULT_ADDR=vault.addr
