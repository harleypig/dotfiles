---
# Auto-fix pre-commit hooks (MODIFYING) — run MANUALLY, never on commit:
#   pre-commit run --config .pre-commit-config-fix.yaml --all-files
# The check-only gate is .pre-commit-config.yaml. Per
# .claude/rules/pre-commit.md, run this once as a final prep step before
# committing, not mid-session in response to individual failures.
#
# Phase 1 (Core).
#
# Refresh revs with:
#   pre-commit autoupdate --config .pre-commit-config-fix.yaml

# archive/ = retired code; .vscode/syncsettings/ = machine-synced VS Code
# profile data.
exclude: '^(archive/|\.vscode/syncsettings/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      # -w = write in place; flags match shfmt.md / .editorconfig.
      # shfmt does not parse .bats (@test); exclude them (see bats.md).
      - id: shfmt
        args: [-w, -i, '2', -s, -bn, -ci, -sr]
        exclude: '\.bats$'
      # Extensionless sourced shell files (shell-startup, config/shell-startup/*,
      # lib/*) aren't tagged `shell` by identify (non-executable, so no shebang
      # read), so select them by path — mirrors .pre-commit-config.yaml.
      - id: shfmt
        alias: shfmt-sourced
        name: shfmt (sourced shell)
        args: [-w, -i, '2', -s, -bn, -ci, -sr]
        types: [text]
        files: '^(shell-startup|config/shell-startup/[^./]+|lib/[^./]+)$'

  - repo: https://github.com/igorshubovych/markdownlint-cli
    # SYNC: keep this rev in lock-step with image[markdownlint] in
    # bin/docker_wrapper (the bin/markdownlint docker wrapper) and the rev in
    # .pre-commit-config.yaml; bump all three together.
    rev: v0.48.0
    hooks:
      # Auto-fix the mechanical markdown rules (blank lines, table style,
      # bare URLs, …). Rules it can't fix (MD040 code-fence language, MD013
      # line length, …) are hand-fixed and gated by the check config.
      # Uses the repo-local .markdownlint.json (auto-discovered at the root).
      - id: markdownlint-fix

  # Phase 3 (Language) — Python fixers (manual). Same scope-exclude as the
  # check config; flake8 has no fix variant (lint-only). Run isort before yapf.
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort

  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      - id: yapf
        args: [-i, --style, config/yapf/style]

  # Perl fixer (perltidy) DEFERRED for the same reasons as the check config
  # (perltidy version drift / perlbrew pinning — see TODO.md). When enabled:
  # - repo: local
  #   hooks:
  #     - id: perltidy
  #       name: perltidy -b
  #       entry: perltidy -b -bext=/
  #       language: system
  #       types: [perl]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      # Markdown and YAML are owned by markdownlint / yamllint; exclude them
      # so prettier does not fight those tools' formatting.
      - id: prettier
        exclude: '\.(md|markdown|ya?ml)$'
